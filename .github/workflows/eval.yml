name: eval

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - 'commands/**'
      - 'skills/**'
      - 'test/fixtures/**'
      - 'test/golden/**'
      - 'scripts/**'
      - '.github/workflows/eval.yml'
  pull_request:
    paths:
      - 'agents/**'
      - 'commands/**'
      - 'skills/**'
      - 'test/fixtures/**'
      - 'test/golden/**'
      - 'scripts/**'
      - '.github/workflows/eval.yml'

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # actions/checkout v4.2.2 — pin to commit SHA, the plugin flags floating tags.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-node v4.1.0
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '20'

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # Fixture/EXPECTED.md parity guard — no API key, no Claude CLI. Runs first
      # so a fixture added without its EXPECTED.md row (or vice versa) fails fast
      # and cheap, before any API spend.
      - name: Check fixture/EXPECTED.md parity
        run: bash scripts/check_fixtures.sh

      # Pure deterministic-transform tests — no API key, no Claude CLI. Runs
      # before the CLI install and the API-spending eval so a transform
      # regression fails fast and cheap.
      - name: Run transform tests
        run: bash scripts/run_transform_tests.sh

      # The agent eval below needs ANTHROPIC_API_KEY; everything above does not.
      # When the secret is absent (a fork, or a repo that has not configured it),
      # skip the CLI install + eval instead of failing the whole pipeline — all the
      # key-free verification (fixture parity, transform tests) has already run.
      - name: Detect ANTHROPIC_API_KEY
        id: apikey
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Agent eval skipped::ANTHROPIC_API_KEY is not configured — skipping the Claude CLI install and the agent eval (scripts/run_eval.sh). Fixture parity and transform tests still ran and passed."
          fi

      - name: Install Claude Code CLI
        if: steps.apikey.outputs.present == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run eval
        if: steps.apikey.outputs.present == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash scripts/run_eval.sh

      # actions/upload-artifact v4.4.3 — upload logs on failure for triage.
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: eval-logs
          path: logs/
          retention-days: 14
