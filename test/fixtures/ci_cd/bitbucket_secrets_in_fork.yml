# Smoke-test fixture: CI/CD rule pack — Rule 3 (untrusted-ref / fork-PR
# pattern) and Rule 4 (secret exposed to untrusted input).
#
# This Bitbucket Pipelines config exposes a deployment secret on a step that
# runs for pull-request builds from forks AND embeds the PR title into a curl
# call alongside the secret.
#
# Expected: 1 insecure_config finding (Rule 3) and 1 insecure_config finding
# (Rule 4) on the same step. Rule 5 (script injection on $BITBUCKET_PR_TITLE)
# may also fire — that's fine.

image: atlassian/default-image:3

pipelines:
  pull-requests:
    "**":
      - step:
          name: deploy-preview
          deployment: production
          script:
            - echo "Previewing PR titled $BITBUCKET_PR_TITLE"
            - curl -H "Authorization: Bearer $PRODUCTION_DEPLOY_TOKEN"
                   -d "title=$BITBUCKET_PR_TITLE"
                   https://api.example.com/preview
